<div class="preview-mockup">
  @if (requiereFirma) {
    <div class="firma-badge">✍️ Requiere firma de autoridad</div>
  }
  @if (fields.length === 0) {
    <p class="empty-hint">Sin campos definidos</p>
  }
  @for (field of fields; track $index) {
    <label class="mock-field">
      <span class="mock-label">
        {{ field.nombre }}
        @if (field.requerido) { <span class="req">*</span> }
        <small class="tipo-hint">{{ formFieldTypeLabel(field.tipo) }}</small>
      </span>
      @switch (field.tipo) {
        @case ('boolean') {
          <select disabled>
            <option>—</option>
            <option>Sí</option>
            <option>No</option>
          </select>
        }
        @case ('textarea') {
          <textarea disabled rows="2" placeholder="Texto largo"></textarea>
        }
        @case ('date') {
          <input type="date" disabled />
        }
        @case ('number') {
          <input type="number" disabled placeholder="0" />
        }
        @case ('select') {
          <select disabled>
            <option>—</option>
            @for (opt of field.opciones ?? []; track opt) {
              <option>{{ opt }}</option>
            }
          </select>
        }
        @default {
          <input type="text" disabled [attr.maxlength]="textMaxLength" placeholder="Texto corto" />
        }
      }
    </label>
  }
</div>
