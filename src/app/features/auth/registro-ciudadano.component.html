<div class="login-page">
  <div class="login-card card">
    <div class="login-header">
      <span class="logo">MMA</span>
      <h1>Registro ciudadano</h1>
      <p>Cree su cuenta para iniciar y seguir trámites</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>Nombre <input formControlName="nombre" autocomplete="given-name" /></label>
      <label>Apellido <input formControlName="apellido" autocomplete="family-name" /></label>
      <label>Email <input type="email" formControlName="email" autocomplete="email" /></label>
      <label>Contraseña <input type="password" formControlName="password" autocomplete="new-password" /></label>
      @if (error) { <p class="error">{{ error }}</p> }
      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        Registrarse @if (loading) { ... }
      </button>
    </form>
    <p class="back-link"><a routerLink="/login">‹ Volver al inicio de sesión</a></p>
  </div>
</div>
