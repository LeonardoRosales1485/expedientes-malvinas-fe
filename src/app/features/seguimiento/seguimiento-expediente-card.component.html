<button
  type="button"
  class="seg-card card"
  [class.selected]="selected"
  (click)="onSelect()"
  [attr.aria-pressed]="selected"
>
  <div class="seg-card-header">
    <span class="seg-card-id">{{ expediente.numeroExpediente }}</span>
    <span class="badge info">{{ expediente.estadoActual | estadoLabel }}</span>
  </div>
  <div class="seg-card-body">
    <p class="seg-card-objeto">{{ expediente.caratula.objeto }}</p>
    @if (circuitoTipo) {
      <span class="seg-card-tipo" [class]="'chip chip--' + circuitoTipoClass">{{ circuitoTipo }}</span>
    }
  </div>
</button>
